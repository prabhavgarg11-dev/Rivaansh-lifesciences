<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Rivaansh Lifesciences</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f2447 0%, #1a3a52 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .offline-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 48px 32px;
            text-align: center;
            max-width: 400px;
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 24px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        h1 {
            color: #0f2447;
            font-size: 28px;
            margin-bottom: 12px;
            font-weight: 700;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        .offline-tips {
            background: #f5f5f5;
            border-left: 4px solid #0f2447;
            padding: 16px;
            text-align: left;
            margin: 24px 0;
            border-radius: 6px;
        }
        .offline-tips h3 {
            color: #0f2447;
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .offline-tips ul {
            list-style: none;
            font-size: 14px;
            color: #666;
        }
        .offline-tips li {
            padding: 4px 0;
        }
        .retry-btn {
            background: linear-gradient(135deg, #0f2447 0%, #1a3a52 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(15, 36, 71, 0.3);
        }
        .retry-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📵</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost internet connection. Don't worry, you can still browse cached products and your cart when you're back online.</p>
        
        <div class="offline-tips">
            <h3>Quick Tips</h3>
            <ul>
                <li>✓ Check your internet connection</li>
                <li>✓ Try turning WiFi off and on</li>
                <li>✓ Move closer to your router</li>
                <li>✓ Check your data plan</li>
            </ul>
        </div>

        <button class="retry-btn" onclick="location.reload()">Try Again</button>
    </div>
</body>
</html>
