services:
  - type: web
    name: rivaansh-backend
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false  # Set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@rivaansh.com
      - key: ADMIN_PASSWORD
        sync: false  # Set securely
      - key: ADMIN_SECRET
        generateValue: true
      - key: RAZORPAY_KEY
        sync: false  # Optional
      - key: RAZORPAY_SECRET
        sync: false  # Optional
      - key: GEMINI_API_KEY
        sync: false  # Optional
      - key: OPENAI_API_KEY
        sync: false  # Optional
      - key: ANTHROPIC_API_KEY
        sync: false  # Optional